<title>PSIR220 – The Epistemology Sorting Hat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#1a1a2e;min-height:100vh}

header{background:#fff;border-bottom:1px solid #e5e7eb;padding:18px 28px}
header h1{font-size:1.4rem;color:#0f3460}
header p{font-size:.85rem;color:#666;margin-top:4px}

main{max-width:700px;margin:0 auto;padding:24px 16px 100px}

.card{background:#fff;border-radius:12px;padding:24px 28px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid #6366f1}
.card h2{font-size:1.2rem;color:#0f3460;margin-bottom:8px}
.card h3{font-size:1.05rem;color:#0f3460;margin-bottom:6px}
.card p{font-size:.95rem;line-height:1.7;margin-bottom:6px}

/* Progress */
.progress-bar{background:#e5e7eb;height:8px;border-radius:4px;margin:16px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#0f3460);border-radius:4px;transition:width .4s}
.progress-text{font-size:.8rem;color:#888;text-align:center;margin-bottom:8px}

/* Question */
.question-card{background:#fff;border-radius:14px;padding:28px;margin:16px 0;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center}
.question-card .q-number{font-size:.8rem;color:#6366f1;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.question-card h2{font-size:1.15rem;color:#1a1a2e;margin-bottom:20px;line-height:1.6}

.options{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.option{background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:14px 18px;cursor:pointer;transition:.2s;text-align:left;font-size:.95rem;line-height:1.5}
.option:hover{border-color:#6366f1;background:#f0f4ff}
.option.selected{border-color:#0f3460;background:#e0e7ff;font-weight:600}

/* Scenario */
.scenario{background:#f0f4ff;border-radius:10px;padding:16px 20px;margin-bottom:16px;font-size:.95rem;line-height:1.7;font-style:italic;border-left:4px solid #6366f1}

/* Result */
.result{text-align:center;padding:32px 24px}
.result .hat-icon{font-size:4rem;margin-bottom:12px}
.result h1{font-size:1.8rem;margin-bottom:4px}
.result .track-name{font-size:1.3rem;font-weight:700;margin:8px 0 16px}
.result .track-name.pos{color:#1e40af}
.result .track-name.int{color:#92400e}
.result .track-name.crit{color:#9d174d}
.result .description{font-size:1rem;line-height:1.7;max-width:560px;margin:0 auto 20px;text-align:left}

.score-section{margin:20px 0}
.score-row{display:flex;align-items:center;gap:12px;margin:8px 0}
.score-label{width:120px;font-size:.88rem;font-weight:600;text-align:right}
.score-bar-bg{flex:1;height:14px;background:#e5e7eb;border-radius:7px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:7px;transition:width .6s}
